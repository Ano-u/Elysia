openapi: 3.1.0
info:
  title: Elysia API (Governance Extension)
  version: 0.4.0
  description: |
    增量 OpenAPI（审核/风控/申诉/准入/自动串联/管理员接口）。
servers:
  - url: /api
paths:
  /onboarding/progress:
    get:
      summary: 查询新人引导与 7 天进度
      parameters:
        - in: query
          name: entryId
          schema:
            type: string
          description: |
            前端在每次真正进入 Home 页面时生成一次，并在该次页面生命周期内复用。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingProgressResponse'
  /onboarding/complete-day:
    post:
      summary: 完成某一天 onboarding 任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [day]
              properties:
                day:
                  type: integer
                  minimum: 1
                  maximum: 7
                evidence:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
  /onboarding/guide-state:
    patch:
      summary: 更新首访导览状态
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingGuideStatePatchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingGuideStatePatchResponse'
  /nudges/recommendations:
    get:
      summary: 查询场景化轻提示
      parameters:
        - in: query
          name: scene
          schema:
            type: string
            enum: [home_idle, first_publish_error, first_publish_success, guide_complete, mindmap_locked]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NudgeRecommendationsResponse'
  /nudges/settings:
    patch:
      summary: 更新轻提示设置
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                dailyLimit:
                  type: integer
                  minimum: 0
                  maximum: 10
                personalizationEnabled:
                  type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
  /nudges/feedback:
    post:
      summary: 提交轻提示反馈
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [liked, dismissed, clicked, manual_trigger]
                context:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
  /access/application/status:
    get:
      summary: 查询准入申请状态
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessApplicationStatusResponse'
  /access/application:
    post:
      summary: 提交准入申请
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [essay]
              properties:
                essay:
                  type: string
                  minLength: 10
                  maxLength: 2000
      responses:
        '200':
          description: 已提交
        '409':
          description: 重复提交或已通过
  /me/auto-linking:
    get:
      summary: 查询自动串联同意设置
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoLinkingPreference'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: 更新自动串联同意设置
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutoLinkingPatchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoLinkingPatchResponse'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /records/{id}/publish-status:
    get:
      summary: 查询发布状态
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishStatusResponse'
  /records/{id}:
    get:
      summary: 查询记录详情（含回复关系）
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordDetailResponse'
  /records/{id}/comments:
    post:
      summary: 创建回复卡片
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReplyRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReplyResponse'
        '403':
          description: 仅可回复公开已发布卡片，或命中风控/准入限制
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /universe/viewport:
    get:
      summary: 查询星海视口内容
      parameters:
        - in: query
          name: x
          schema:
            type: number
        - in: query
          name: y
          schema:
            type: number
        - in: query
          name: w
          schema:
            type: number
        - in: query
          name: h
          schema:
            type: number
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 60
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UniverseViewportResponse'
  /appeals/status:
    get:
      summary: 查询我的封禁与申诉状态
      responses:
        '200':
          description: OK
  /appeals:
    post:
      summary: 提交申诉（单封禁事件仅一次）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [banEventId, appealText]
              properties:
                banEventId:
                  type: string
                  format: uuid
                appealText:
                  type: string
                  minLength: 10
                  maxLength: 3000
      responses:
        '200':
          description: OK
        '409':
          description: APPEAL_PENDING 或 APPEAL_USED
  /admin/moderation/queue:
    get:
      summary: 管理员-审核队列
      parameters:
        - in: query
          name: queueType
          schema:
            type: string
            enum: [moderation, second_review, risk_control, access_application, appeal, media_review]
        - in: query
          name: queueStatus
          schema:
            type: string
            enum: [open, claimed, resolved]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: OK
  /admin/moderation/records/{id}/decision:
    post:
      summary: 管理员-文本审核决策
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approve, reject, needs_changes, second_review, risk_control]
                note:
                  type: string
      responses:
        '200':
          description: OK
  /admin/moderation/media/{id}/decision:
    post:
      summary: 管理员-图片审核决策
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approve, reject]
                note:
                  type: string
      responses:
        '200':
          description: OK
  /admin/access/applications:
    get:
      summary: 管理员-准入申请池
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: OK
  /admin/access/applications/{id}/approve:
    post:
      summary: 管理员-通过准入申请
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  /admin/access/applications/{id}/reject:
    post:
      summary: 管理员-驳回准入申请
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  /admin/risk-control/events:
    get:
      summary: 管理员-风控事件列表
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, released, warned, banned]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: OK
  /admin/risk-control/events/{id}/action:
    post:
      summary: 管理员-风控处置
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [release, warn, ban_temp, ban_permanent]
                note:
                  type: string
                banHours:
                  type: integer
                ipHash:
                  type: string
      responses:
        '200':
          description: OK
  /admin/bans:
    get:
      summary: 管理员-封禁中心列表
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, lifted]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: OK
  /admin/bans/{id}/lift:
    post:
      summary: 管理员-解封
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  /admin/appeals:
    get:
      summary: 管理员-申诉列表
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: OK
  /admin/appeals/{id}/approve:
    post:
      summary: 管理员-通过申诉
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  /admin/appeals/{id}/reject:
    post:
      summary: 管理员-驳回申诉
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  /admin/ai-review/config:
    get:
      summary: 管理员-获取 AI 审核配置
      responses:
        '200':
          description: OK
    put:
      summary: 管理员-更新 AI 审核配置
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [baseUrl, endpointType, model]
              properties:
                baseUrl:
                  type: string
                apiKey:
                  type: string
                endpointType:
                  type: string
                  enum: [responses, completions]
                model:
                  type: string
                isEnabled:
                  type: boolean
      responses:
        '200':
          description: OK
  /admin/ai-review/scan-recent:
    post:
      summary: 管理员-扫描最近1小时公开文本申请
      responses:
        '200':
          description: OK
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
          nullable: true
    AutoLinkingPreference:
      type: object
      properties:
        enabled:
          type: boolean
          default: false
        scope:
          type: string
          enum: [private_only, public_recommendation]
          default: private_only
        mode:
          type: string
          enum: [suggestion]
          default: suggestion
        consentedAt:
          type: string
          format: date-time
          nullable: true
    AutoLinkingPatchRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
        scope:
          type: string
          enum: [private_only, public_recommendation]
        mode:
          type: string
          enum: [suggestion]
    AutoLinkingPatchResponse:
      type: object
      properties:
        ok:
          type: boolean
        autoLinking:
          $ref: '#/components/schemas/AutoLinkingPreference'
        hint:
          type: string
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
    OnboardingGuideStep:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        target:
          type: string
        ctaText:
          type: string
    OnboardingGuideSafetyCard:
      type: object
      properties:
        title:
          type: string
        bullets:
          type: array
          items:
            type: string
        confirmText:
          type: string
    OnboardingGuideState:
      type: object
      properties:
        completedAt:
          type: string
          format: date-time
          nullable: true
        skippedAt:
          type: string
          format: date-time
          nullable: true
        lastSeenStep:
          type: integer
        version:
          type: string
        canReplay:
          type: boolean
        entryCount:
          type: integer
        lastPresentedAt:
          type: string
          format: date-time
          nullable: true
        lastEntryId:
          type: string
          nullable: true
    OnboardingGuideDisplay:
      type: object
      properties:
        shouldShow:
          type: boolean
        allowSkip:
          type: boolean
        forceBlocking:
          type: boolean
        reason:
          type: string
          enum: [first_entry_without_content, returning_without_content, already_sent_content, local_debug]
        localDebugForceShow:
          type: boolean
        showEveryEntryUntilFirstContent:
          type: boolean
    OnboardingGuideMoodExerciseStep:
      type: object
      properties:
        id:
          type: string
        instruction:
          type: string
        requiredSelectedCount:
          type: integer
        allowCancel:
          type: boolean
    OnboardingGuideMoodExercise:
      type: object
      properties:
        target:
          type: string
        maxSelections:
          type: integer
        presetOnly:
          type: boolean
        sequence:
          type: array
          items:
            $ref: '#/components/schemas/OnboardingGuideMoodExerciseStep'
    OnboardingGuideDraftField:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        value:
          type: string
        target:
          type: string
        helperText:
          type: string
    OnboardingGuideDraftTemplate:
      type: object
      properties:
        visibilityIntent:
          type: string
          enum: [private, public]
        expectedPublishStatus:
          type: string
        approvalHint:
          type: string
        moodExercise:
          $ref: '#/components/schemas/OnboardingGuideMoodExercise'
        fields:
          type: array
          items:
            $ref: '#/components/schemas/OnboardingGuideDraftField'
    OnboardingGuideFeatureTourItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        target:
          type: string
        interaction:
          type: string
          enum: [tap, drag, zoom, observe]
    OnboardingGuideStatusHint:
      type: object
      properties:
        status:
          type: string
        label:
          type: string
        description:
          type: string
    OnboardingGuideContentState:
      type: object
      properties:
        hasSentAnyContent:
          type: boolean
        sentContentCount:
          type: integer
    OnboardingGuide:
      type: object
      properties:
        version:
          type: string
        welcomeTitle:
          type: string
        welcomeDescription:
          type: string
        welcomePrimaryAction:
          type: string
        welcomeSecondaryAction:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/OnboardingGuideStep'
        safetyCard:
          $ref: '#/components/schemas/OnboardingGuideSafetyCard'
        display:
          $ref: '#/components/schemas/OnboardingGuideDisplay'
        draftTemplate:
          $ref: '#/components/schemas/OnboardingGuideDraftTemplate'
        featureTour:
          type: array
          items:
            $ref: '#/components/schemas/OnboardingGuideFeatureTourItem'
        statusGlossary:
          type: array
          items:
            $ref: '#/components/schemas/OnboardingGuideStatusHint'
        contentState:
          $ref: '#/components/schemas/OnboardingGuideContentState'
        state:
          $ref: '#/components/schemas/OnboardingGuideState'
    OnboardingTask:
      type: object
      properties:
        day:
          type: integer
        title:
          type: string
        code:
          type: string
        description:
          type: string
        ctaText:
          type: string
        ctaTarget:
          type: string
        rewardText:
          type: string
    OnboardingEntryContext:
      type: object
      properties:
        needsAccessApplication:
          type: boolean
        accessStatus:
          type: string
          enum: [not_submitted, pending, approved, rejected]
        estimatedReviewText:
          type: string
          nullable: true
        applicationHint:
          type: string
          nullable: true
    OnboardingRestartSuggestion:
      type: object
      properties:
        shouldShow:
          type: boolean
        headline:
          type: string
          nullable: true
        body:
          type: string
          nullable: true
    OnboardingProgressResponse:
      type: object
      properties:
        progress:
          type: object
          properties:
            current_day:
              type: integer
            completed_days:
              type: array
              items:
                type: integer
            last_completed_at:
              type: string
              format: date-time
              nullable: true
            metadata:
              type: object
              additionalProperties: true
        guide:
          $ref: '#/components/schemas/OnboardingGuide'
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/OnboardingTask'
        targetTimeSeconds:
          type: integer
        entryContext:
          $ref: '#/components/schemas/OnboardingEntryContext'
        restartSuggestion:
          $ref: '#/components/schemas/OnboardingRestartSuggestion'
        contentState:
          $ref: '#/components/schemas/OnboardingGuideContentState'
    OnboardingGuideStatePatchRequest:
      type: object
      minProperties: 1
      properties:
        completedAt:
          type: string
          format: date-time
          nullable: true
        skippedAt:
          type: string
          format: date-time
          nullable: true
        lastSeenStep:
          type: integer
        version:
          type: string
    OnboardingGuideStatePatchResponse:
      type: object
      properties:
        ok:
          type: boolean
        state:
          $ref: '#/components/schemas/OnboardingGuideState'
    NudgeItem:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        actionLabel:
          type: string
        actionTarget:
          type: string
    NudgeRecommendationsResponse:
      type: object
      properties:
        scene:
          type: string
          enum: [home_idle, first_publish_error, first_publish_success, guide_complete, mindmap_locked]
        items:
          type: array
          items:
            $ref: '#/components/schemas/NudgeItem'
    AccessApplicationStatusResponse:
      type: object
      properties:
        accessStatus:
          type: string
          enum: [not_submitted, pending, approved, rejected]
        canSubmit:
          type: boolean
        application:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            essay:
              type: string
            status:
              type: string
              enum: [pending, approved, rejected]
            reviewNote:
              type: string
              nullable: true
            submittedAt:
              type: string
              format: date-time
            reviewedAt:
              type: string
              format: date-time
              nullable: true
    PublishStatusResponse:
      type: object
      properties:
        recordId:
          type: string
          format: uuid
        visibilityIntent:
          type: string
          enum: [private, public]
        status:
          type: string
          enum: [private, pending_auto, pending_manual, pending_second_review, risk_control_24h, published, rejected, needs_changes]
        label:
          type: string
        isPublic:
          type: boolean
        publishRequestedAt:
          type: string
          format: date-time
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        reviewNotes:
          type: string
          nullable: true
        riskSummary:
          type: object
          additionalProperties: true
    AuthorPayload:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
    ReplyTarget:
      type: object
      properties:
        id:
          type: string
          format: uuid
        moodPhrase:
          type: string
        quote:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        isPublic:
          type: boolean
        publicationStatus:
          type: string
          enum: [private, pending_auto, pending_manual, pending_second_review, risk_control_24h, published, rejected, needs_changes]
        author:
          $ref: '#/components/schemas/AuthorPayload'
    ReplyContext:
      type: object
      properties:
        content:
          type: string
        parentRecordId:
          type: string
          format: uuid
        rootRecordId:
          type: string
          format: uuid
        parentTarget:
          allOf:
            - $ref: '#/components/schemas/ReplyTarget'
          nullable: true
        rootTarget:
          allOf:
            - $ref: '#/components/schemas/ReplyTarget'
          nullable: true
    RecordSummaryWithReplyContext:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        mood_phrase:
          type: string
        quote:
          type: string
          nullable: true
        extra_emotions:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        description:
          type: string
          nullable: true
        visibility_intent:
          type: string
