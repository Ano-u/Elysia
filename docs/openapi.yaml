openapi: 3.1.0
info:
  title: Elysia API (Governance Extension)
  version: 0.4.0
  description: |
    增量 OpenAPI（审核/风控/申诉/准入/自动串联/管理员接口）。
servers:
  - url: /api
paths:
  /access/application/status:
    get:
      summary: 查询准入申请状态
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessApplicationStatusResponse'
  /access/application:
    post:
      summary: 提交准入申请
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [essay]
              properties:
                essay:
                  type: string
                  minLength: 10
                  maxLength: 2000
      responses:
        '200':
          description: 已提交
        '409':
          description: 重复提交或已通过
  /me/auto-linking:
    get:
      summary: 查询自动串联同意设置
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoLinkingPreference'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: 更新自动串联同意设置
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutoLinkingPatchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoLinkingPatchResponse'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /records/{id}/publish-status:
    get:
      summary: 查询发布状态
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishStatusResponse'
  /records/{id}:
    get:
      summary: 查询记录详情（含回复关系）
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordDetailResponse'
  /records/{id}/comments:
    post:
      summary: 创建回复卡片
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReplyRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReplyResponse'
        '403':
          description: 仅可回复公开已发布卡片，或命中风控/准入限制
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /universe/viewport:
    get:
      summary: 查询星海视口内容
      parameters:
        - in: query
          name: x
          schema:
            type: number
        - in: query
          name: y
          schema:
            type: number
        - in: query
          name: w
          schema:
            type: number
        - in: query
          name: h
          schema:
            type: number
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 60
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UniverseViewportResponse'
  /appeals/status:
    get:
      summary: 查询我的封禁与申诉状态
      responses:
        '200':
          description: OK
  /appeals:
    post:
      summary: 提交申诉（单封禁事件仅一次）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [banEventId, appealText]
              properties:
                banEventId:
                  type: string
                  format: uuid
                appealText:
                  type: string
                  minLength: 10
                  maxLength: 3000
      responses:
        '200':
          description: OK
        '409':
          description: APPEAL_PENDING 或 APPEAL_USED
  /admin/moderation/queue:
    get:
      summary: 管理员-审核队列
      parameters:
        - in: query
          name: queueType
          schema:
            type: string
            enum: [moderation, second_review, risk_control, access_application, appeal, media_review]
        - in: query
          name: queueStatus
          schema:
            type: string
            enum: [open, claimed, resolved]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: OK
  /admin/moderation/records/{id}/decision:
    post:
      summary: 管理员-文本审核决策
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approve, reject, needs_changes, second_review, risk_control]
                note:
                  type: string
      responses:
        '200':
          description: OK
  /admin/moderation/media/{id}/decision:
    post:
      summary: 管理员-图片审核决策
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approve, reject]
                note:
                  type: string
      responses:
        '200':
          description: OK
  /admin/access/applications:
    get:
      summary: 管理员-准入申请池
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: OK
  /admin/access/applications/{id}/approve:
    post:
      summary: 管理员-通过准入申请
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  /admin/access/applications/{id}/reject:
    post:
      summary: 管理员-驳回准入申请
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  /admin/risk-control/events:
    get:
      summary: 管理员-风控事件列表
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, released, warned, banned]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: OK
  /admin/risk-control/events/{id}/action:
    post:
      summary: 管理员-风控处置
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [release, warn, ban_temp, ban_permanent]
                note:
                  type: string
                banHours:
                  type: integer
                ipHash:
                  type: string
      responses:
        '200':
          description: OK
  /admin/bans:
    get:
      summary: 管理员-封禁中心列表
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, lifted]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: OK
  /admin/bans/{id}/lift:
    post:
      summary: 管理员-解封
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  /admin/appeals:
    get:
      summary: 管理员-申诉列表
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: OK
  /admin/appeals/{id}/approve:
    post:
      summary: 管理员-通过申诉
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  /admin/appeals/{id}/reject:
    post:
      summary: 管理员-驳回申诉
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  /admin/ai-review/config:
    get:
      summary: 管理员-获取 AI 审核配置
      responses:
        '200':
          description: OK
    put:
      summary: 管理员-更新 AI 审核配置
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [baseUrl, endpointType, model]
              properties:
                baseUrl:
                  type: string
                apiKey:
                  type: string
                endpointType:
                  type: string
                  enum: [responses, completions]
                model:
                  type: string
                isEnabled:
                  type: boolean
      responses:
        '200':
          description: OK
  /admin/ai-review/scan-recent:
    post:
      summary: 管理员-扫描最近1小时公开文本申请
      responses:
        '200':
          description: OK
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
          nullable: true
    AutoLinkingPreference:
      type: object
      properties:
        enabled:
          type: boolean
          default: false
        scope:
          type: string
          enum: [private_only, public_recommendation]
          default: private_only
        mode:
          type: string
          enum: [suggestion]
          default: suggestion
        consentedAt:
          type: string
          format: date-time
          nullable: true
    AutoLinkingPatchRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
        scope:
          type: string
          enum: [private_only, public_recommendation]
        mode:
          type: string
          enum: [suggestion]
    AutoLinkingPatchResponse:
      type: object
      properties:
        ok:
          type: boolean
        autoLinking:
          $ref: '#/components/schemas/AutoLinkingPreference'
        hint:
          type: string
    AccessApplicationStatusResponse:
      type: object
      properties:
        accessStatus:
          type: string
          enum: [not_submitted, pending, approved, rejected]
        canSubmit:
          type: boolean
        application:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            essay:
              type: string
            status:
              type: string
              enum: [pending, approved, rejected]
            reviewNote:
              type: string
              nullable: true
            submittedAt:
              type: string
              format: date-time
            reviewedAt:
              type: string
              format: date-time
              nullable: true
    PublishStatusResponse:
      type: object
      properties:
        recordId:
          type: string
          format: uuid
        visibilityIntent:
          type: string
          enum: [private, public]
        status:
          type: string
          enum: [private, pending_auto, pending_manual, pending_second_review, risk_control_24h, published, rejected, needs_changes]
        label:
          type: string
        isPublic:
          type: boolean
        publishRequestedAt:
          type: string
          format: date-time
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        reviewNotes:
          type: string
          nullable: true
        riskSummary:
          type: object
          additionalProperties: true
    AuthorPayload:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
    ReplyTarget:
      type: object
      properties:
        id:
          type: string
          format: uuid
        moodPhrase:
          type: string
        quote:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        isPublic:
          type: boolean
        publicationStatus:
          type: string
          enum: [private, pending_auto, pending_manual, pending_second_review, risk_control_24h, published, rejected, needs_changes]
        author:
          $ref: '#/components/schemas/AuthorPayload'
    ReplyContext:
      type: object
      properties:
        content:
          type: string
        parentRecordId:
          type: string
          format: uuid
        rootRecordId:
          type: string
          format: uuid
        parentTarget:
          allOf:
            - $ref: '#/components/schemas/ReplyTarget'
          nullable: true
        rootTarget:
          allOf:
            - $ref: '#/components/schemas/ReplyTarget'
          nullable: true
    RecordSummaryWithReplyContext:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        mood_phrase:
          type: string
        quote:
          type: string
          nullable: true
        extra_emotions:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        description:
          type: string
          nullable: true
        visibility_intent:
          type: string
          enum: [private, public]
        publication_status:
          type: string
          enum: [private, pending_auto, pending_manual, pending_second_review, risk_control_24h, published, rejected, needs_changes]
        is_public:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        replyContext:
          allOf:
            - $ref: '#/components/schemas/ReplyContext'
          nullable: true
    CommentMeta:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        parentRecordId:
          type: string
          format: uuid
        rootRecordId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
    CreateReplyRequest:
      type: object
      required: [content, moodPhrase]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 300
        moodPhrase:
          type: string
          minLength: 1
          maxLength: 140
        quote:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        extraEmotions:
          type: array
          maxItems: 8
          items:
            type: string
            maxLength: 32
        isPublic:
          type: boolean
          description: 默认 true；设为 false 时保存为私密回复卡片
    CreateReplyResponse:
      type: object
      properties:
        comment:
          $ref: '#/components/schemas/CommentMeta'
        record:
          $ref: '#/components/schemas/RecordSummaryWithReplyContext'
        publishStatus:
          type: object
          properties:
            status:
              type: string
              enum: [private, pending_auto, pending_manual, pending_second_review, risk_control_24h, published, rejected, needs_changes]
            label:
              type: string
    RecordDetailResponse:
      type: object
      properties:
        record:
          type: object
          properties:
            id:
              type: string
              format: uuid
            user_id:
              type: string
              format: uuid
            mood_phrase:
              type: string
            description:
              type: string
              nullable: true
            is_public:
              type: boolean
            visibility_intent:
              type: string
              enum: [private, public]
            publication_status:
              type: string
              enum: [private, pending_auto, pending_manual, pending_second_review, risk_control_24h, published, rejected, needs_changes]
            publish_requested_at:
              type: string
              format: date-time
              nullable: true
            published_at:
              type: string
              format: date-time
              nullable: true
            risk_summary:
              type: object
              additionalProperties: true
            review_notes:
              type: string
              nullable: true
            occurred_at:
              type: string
              format: date-time
              nullable: true
            location_id:
              type: string
              format: uuid
              nullable: true
            source_record_id:
              type: string
              format: uuid
              nullable: true
            source_comment_id:
              type: string
              format: uuid
              nullable: true
            edit_deadline_at:
              type: string
              format: date-time
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
        quote:
          type: string
          nullable: true
        extraEmotions:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        author:
          $ref: '#/components/schemas/AuthorPayload'
        replyContext:
          allOf:
            - $ref: '#/components/schemas/ReplyContext'
          nullable: true
    UniverseItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        mood_phrase:
          type: string
        quote:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        extra_emotions:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        display_name:
          type: string
        avatar_url:
          type: string
          nullable: true
        hearts:
          type: string
        hugs:
          type: string
        stars:
          type: string
        butterflies:
          type: string
        flowers:
          type: string
        coord:
          type: object
          properties:
            x:
              type: number
            y:
              type: number
        personalScore:
          type: number
        replyContext:
          type: object
          nullable: true
          properties:
            isReply:
              type: boolean
            parentRecordId:
              type: string
              format: uuid
              nullable: true
            rootRecordId:
              type: string
              format: uuid
              nullable: true
            showParentArrow:
              type: boolean
            showRootArrow:
              type: boolean
    UniverseViewportResponse:
      type: object
      properties:
        viewport:
          type: object
          properties:
            x:
              type: number
            y:
              type: number
            w:
              type: number
            h:
              type: number
        items:
          type: array
          items:
            $ref: '#/components/schemas/UniverseItem'
        focus:
          type: object
          properties:
            primary:
              allOf:
                - $ref: '#/components/schemas/UniverseItem'
              nullable: true
            secondary:
              type: array
              items:
                $ref: '#/components/schemas/UniverseItem'
        renderHint:
          type: object
          properties:
            blurFirst:
              type: boolean
            focusRefreshSeconds:
              type: integer
